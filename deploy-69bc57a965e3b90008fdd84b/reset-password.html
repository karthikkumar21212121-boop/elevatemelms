<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevateMe · Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Nunito Sans',sans-serif; }
        body { min-height:100vh; background:#c8ecd4; display:flex; align-items:center; justify-content:center; padding:1rem; }
        .card { background:white; border-radius:20px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(45,74,53,0.12); }
        .logo { text-align:center; margin-bottom:2rem; }
        .logo img { height:36px; width:auto; }
        .logo p { font-size:0.85rem; color:#4a6b55; margin-top:0.4rem; font-weight:600; }
        .form-group { margin-bottom:1.2rem; }
        label { display:block; font-size:0.82rem; font-weight:700; color:#1a1a1a; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.05em; }
        input[type="password"] { width:100%; padding:0.75rem 1rem; border:1.5px solid #c8ecd4; border-radius:10px; font-size:0.95rem; color:#1a1a1a; font-family:'Nunito Sans',sans-serif; transition:border-color 0.2s; outline:none; }
        input:focus { border-color:#488a6d; }
        .password-wrap { position:relative; }
        .toggle-pw { position:absolute; right:0.9rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#4a6b55; font-size:0.9rem; }
        .strength-bar { height:4px; background:#e0f0e9; border-radius:99px; margin-top:0.4rem; overflow:hidden; }
        .strength-fill { height:100%; width:0%; border-radius:99px; transition:width 0.3s, background 0.3s; }
        .strength-label { font-size:0.75rem; color:#4a6b55; margin-top:0.3rem; font-weight:600; }
        .btn-reset { width:100%; padding:0.85rem; background:#1a1a1a; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:800; font-family:'Nunito Sans',sans-serif; cursor:pointer; transition:0.2s; letter-spacing:0.02em; margin-top:0.5rem; }
        .btn-reset:hover { background:#c7493a; }
        .btn-reset:disabled { background:#a0c4b0; cursor:not-allowed; }
        .error-msg { background:#fff0f0; border:1px solid #f5c6be; border-radius:10px; padding:0.8rem 1rem; font-size:0.85rem; color:#c65343; margin-top:1rem; display:none; align-items:center; gap:0.5rem; }
        .error-msg.show { display:flex; }
        .success-msg { background:#eef7f2; border:1px solid #c8e6d8; border-radius:10px; padding:0.8rem 1rem; font-size:0.85rem; color:#488a6d; margin-top:1rem; display:none; align-items:center; gap:0.5rem; }
        .success-msg.show { display:flex; }
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .back-link { text-align:center; margin-top:1.2rem; }
        .back-link a { color:#488a6d; font-size:0.85rem; text-decoration:none; font-weight:600; }
        .back-link a:hover { text-decoration:underline; color:#c7493a; }
        .invalid-token { text-align:center; padding:1rem; }
        .invalid-token i { font-size:2.5rem; color:#c7493a; margin-bottom:1rem; display:block; }
        .invalid-token h3 { font-size:1.1rem; font-weight:800; color:#1a1a1a; margin-bottom:0.5rem; }
        .invalid-token p { font-size:0.85rem; color:#4a6b55; line-height:1.6; }
        .loading { text-align:center; padding:2rem; color:#4a6b55; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="https://elevateme.pro/wp-content/themes/elevateme/assets/images/logo.svg" alt="ElevateMe">
        <p>Set your new password</p>
    </div>

    <div id="loadingView" class="loading">
        <i class="fas fa-circle-notch fa-spin" style="font-size:1.5rem;color:#488a6d;"></i>
        <p style="margin-top:0.5rem;">Verifying your link…</p>
    </div>

    <div id="resetForm" style="display:none;">
        <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="password-wrap">
                <input type="password" id="newPassword" placeholder="Min. 8 characters" oninput="checkStrength(this.value)"/>
                <button class="toggle-pw" type="button" onclick="togglePw('newPassword',this)"><i class="fas fa-eye"></i></button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrap">
                <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
                <button class="toggle-pw" type="button" onclick="togglePw('confirmPassword',this)"><i class="fas fa-eye"></i></button>
            </div>
        </div>
        <button class="btn-reset" id="resetBtn" onclick="handleReset()">Set New Password</button>
        <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i><span id="errorText">Something went wrong.</span></div>
        <div class="success-msg" id="successMsg"><i class="fas fa-check-circle"></i><span>Password updated! Redirecting to login…</span></div>
    </div>

    <div id="invalidToken" style="display:none;">
        <div class="invalid-token">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Link expired or invalid</h3>
            <p>This password reset link has expired or already been used. Please request a new one.</p>
        </div>
        <a href="login.html" class="btn-reset" style="display:block;text-align:center;text-decoration:none;margin-top:1rem;">Back to Login</a>
    </div>

    <div class="back-link"><a href="login.html"><i class="fas fa-arrow-left"></i> Back to login</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://jlfbmawoyiwzvzklngxr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJtYXdveWl3enZ6a2xuZ3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDI0OTMsImV4cCI6MjA4OTUxODQ5M30.JuMbxTyAhujTB4RqPiKbn5d4pxqK67EO_CTBj1xwt9o';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function show(id) {
    ['loadingView','resetForm','invalidToken'].forEach(v => {
        document.getElementById(v).style.display = v === id ? 'block' : 'none';
    });
}

(async () => {
    // Check BOTH query params (?token=) and hash (#access_token=)
    const urlParams  = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/,''));

    const token        = urlParams.get('token');
    const type         = urlParams.get('type') || hashParams.get('type');
    const access_token = hashParams.get('access_token');
    const refresh_token = hashParams.get('refresh_token') || '';

    if (!type || type !== 'recovery') { show('invalidToken'); return; }

    // Method 1: TokenHash via query string (?token=xxx)
    if (token) {
        const { error } = await _sb.auth.verifyOtp({
            token_hash: token,
            type: 'recovery'
        });
        if (error) { show('invalidToken'); return; }
        show('resetForm'); return;
    }

    // Method 2: access_token via hash (#access_token=xxx)
    if (access_token) {
        const { error } = await _sb.auth.setSession({
            access_token,
            refresh_token
        });
        if (error) { show('invalidToken'); return; }
        show('resetForm'); return;
    }

    show('invalidToken');
})();

async function handleReset() {
    const pw  = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('resetBtn');
    const errEl = document.getElementById('errorMsg');
    errEl.classList.remove('show');

    if (pw.length < 8) {
        document.getElementById('errorText').textContent = 'Password must be at least 8 characters.';
        errEl.classList.add('show'); return;
    }
    if (pw !== pw2) {
        document.getElementById('errorText').textContent = 'Passwords do not match.';
        errEl.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Updating…';

    const { error } = await _sb.auth.updateUser({ password: pw });

    if (error) {
        document.getElementById('errorText').textContent = error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Set New Password';
    } else {
        document.getElementById('successMsg').classList.add('show');
        btn.innerHTML = '✓ Done!';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    }
}

function checkStrength(pw) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const map = [
        {w:'0%',bg:'#e0f0e9',l:''},
        {w:'25%',bg:'#c7493a',l:'Weak'},
        {w:'50%',bg:'#f0a500',l:'Fair'},
        {w:'75%',bg:'#488a6d',l:'Good'},
        {w:'100%',bg:'#2d6b52',l:'Strong'},
    ];
    fill.style.width = map[score].w;
    fill.style.background = map[score].bg;
    label.textContent = map[score].l;
    label.style.color = map[score].bg;
}

function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const icon = btn.querySelector('i');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
</script>
</body>
</html>
